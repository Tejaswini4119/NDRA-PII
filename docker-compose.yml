services:
  api:
    build: .
    container_name: ndra-pii-api
    ports:
      - "8001:8001"
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
      - ./quarantine:/app/quarantine
      - ./artifacts:/app/artifacts
      - ./audit:/app/audit
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - AUDIT_LOG_FILE=/app/audit/audit.log
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  prometheus:
    image: prom/prometheus:latest
    container_name: ndra-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  grafana:
    image: grafana/grafana:latest
    container_name: ndra-grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      # Set GF_SECURITY_ADMIN_PASSWORD in your .env file or deployment secrets.
      # Never leave this as the default 'admin' in production.
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-changeme}
